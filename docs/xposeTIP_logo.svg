<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="64" fill="url(#bgGrad)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#06b6d4" stroke-width="0.5">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Outer fingerprint/radar rings -->
  <circle cx="256" cy="220" r="130" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.2"/>
  <circle cx="256" cy="220" r="105" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="220" r="80" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Radar cross lines -->
  <g stroke="url(#accentGrad)" stroke-width="1" opacity="0.15">
    <line x1="256" y1="85" x2="256" y2="355"/>
    <line x1="121" y1="220" x2="391" y2="220"/>
    <line x1="164" y1="128" x2="348" y2="312"/>
    <line x1="348" y1="128" x2="164" y2="312"/>
  </g>

  <!-- Identity figure (stylized person silhouette) -->
  <!-- Head -->
  <circle cx="256" cy="185" r="32" fill="url(#accentGrad)"/>
  <!-- Body -->
  <path d="M 214 228 Q 214 215 228 210 L 256 205 L 284 210 Q 298 215 298 228 L 298 275 Q 298 285 288 285 L 224 285 Q 214 285 214 275 Z" fill="url(#accentGrad)"/>
  
  <!-- Scan lines over figure -->
  <g opacity="0.5">
    <line x1="205" y1="195" x2="307" y2="195" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="3,4"/>
    <line x1="205" y1="220" x2="307" y2="220" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="3,4"/>
    <line x1="205" y1="245" x2="307" y2="245" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="3,4"/>
    <line x1="205" y1="270" x2="307" y2="270" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="3,4"/>
  </g>
  
  <!-- Data nodes around the figure -->
  <g fill="#06b6d4">
    <circle cx="160" cy="155" r="5" opacity="0.7"/>
    <circle cx="352" cy="155" r="5" opacity="0.7"/>
    <circle cx="145" cy="245" r="5" opacity="0.5"/>
    <circle cx="367" cy="245" r="5" opacity="0.5"/>
    <circle cx="175" cy="310" r="4" opacity="0.4"/>
    <circle cx="337" cy="310" r="4" opacity="0.4"/>
  </g>
  
  <!-- Connection lines from nodes to figure -->
  <g stroke="#06b6d4" stroke-width="1" opacity="0.25">
    <line x1="160" y1="155" x2="228" y2="190"/>
    <line x1="352" y1="155" x2="284" y2="190"/>
    <line x1="145" y1="245" x2="214" y2="245"/>
    <line x1="367" y1="245" x2="298" y2="245"/>
    <line x1="175" y1="310" x2="224" y2="280"/>
    <line x1="337" y1="310" x2="288" y2="280"/>
  </g>

  <!-- Crosshair corners -->
  <g stroke="#06b6d4" stroke-width="2.5" opacity="0.8">
    <!-- Top-left -->
    <line x1="140" y1="100" x2="140" y2="130"/>
    <line x1="140" y1="100" x2="170" y2="100"/>
    <!-- Top-right -->
    <line x1="372" y1="100" x2="372" y2="130"/>
    <line x1="372" y1="100" x2="342" y2="100"/>
    <!-- Bottom-left -->
    <line x1="140" y1="340" x2="140" y2="310"/>
    <line x1="140" y1="340" x2="170" y2="340"/>
    <!-- Bottom-right -->
    <line x1="372" y1="340" x2="372" y2="310"/>
    <line x1="372" y1="340" x2="342" y2="340"/>
  </g>

  <!-- Text: xposeTIP -->
  <text x="256" y="410" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="52" font-weight="700" letter-spacing="2">
    <tspan fill="#e2e8f0">xpose</tspan><tspan fill="#06b6d4">TIP</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="256" y="445" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#64748b" letter-spacing="4" text-transform="uppercase">
    IDENTITY THREAT INTELLIGENCE
  </text>
</svg>